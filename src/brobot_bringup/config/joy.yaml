teleop_twist_joy_node:
  ros__parameters:
    deadzone: 0.05
    autorepeat_rate: 20.0

    axis_linear:
      x: 1  # Left stick vertical
    scale_linear:
      x: 0.5
    scale_linear_turbo:
      x: 1.0

    axis_angular:
      yaw: 0  # Left stick horizontal
    scale_angular:
      yaw: 0.5
    scale_angular_turbo:
      yaw: 1.0

    require_enable_button: true 
    enable_button: 6  # Left trigger 
    enable_turbo_button: 7  # Right trigger
