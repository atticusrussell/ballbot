name: ROS Lint

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  lint:
    name: ament_${{ matrix.linter }}
    runs-on: ubuntu-latest
    container:
      image: althack/ros2:humble-dev
    strategy:
      fail-fast: false
      matrix:
        linter: [lint_cmake, xmllint, flake8]
    steps:
      - uses: actions/checkout@v4
      - name: Run ament_${{ matrix.linter }}
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          case "${{ matrix.linter }}" in
            flake8)
              ament_flake8 --config .github/ament_flake8.ini src/
              ;;
            xmllint)
              # additional.xml is an onshape-to-robot fragment, not a
              # complete XML document. ament_xmllint --exclude has greedy
              # nargs that mangles the positional path, so build the file
              # list with find instead.
              find src -name '*.xml' ! -path '*/ballbot_generated/additional.xml' -print0 \
                | xargs -0 -r ament_xmllint
              ;;
            *)
              ament_${{ matrix.linter }} src/
              ;;
          esac
