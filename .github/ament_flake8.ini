[flake8]
# D-codes: docstring conventions — too noisy for inherited launch files.
# E1xx/E2xx/E3xx/E5xx, W2xx/W3xx/W391: whitespace, blank-line, line-length nits.
# F401/F841 (real bugs — unused import/local) intentionally NOT ignored.
extend-ignore =
    B902,C816,Q000,I202,
    D100,D101,D102,D103,D104,D105,D106,D107,D203,D212,D404,
    E111,E114,E116,E117,E122,E128,E131,
    E225,E231,E261,E262,E265,
    E302,E303,E305,
    E501,
    W291,W292,W293,W391
import-order-style = google
max-line-length = 99
show-source = true
statistics = true
